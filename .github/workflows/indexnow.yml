name: IndexNow Bildirimi

# Yayınlanan içerik URL'lerini Bing/Yandex'e anında indeksleme için bildirir.
# main dalına içerik push'unda otomatik; elle de tetiklenebilir. Sadece dışarı bildirim
# gönderir, depoya yazmaz. Secret GEREKTİRMEZ (IndexNow anahtarı herkese açık).
on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  indexnow:
    name: URL'leri IndexNow'a bildir
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: IndexNow'a bildir
        run: npm run indexnow
