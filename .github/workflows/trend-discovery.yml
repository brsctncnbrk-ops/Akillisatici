name: Trend Keşif Ajanı (Faz 2)

# Otomatik YAYIN YAPMAZ: yalnızca taslak üretip drafts/'a commit eder ve
# Telegram bildirimi gönderir.
# Onay: Telegram mesajındaki ✅ Yayınla butonuna basılınca Vercel webhook devralır.
#
# NOT (2026-06-22): Otomatik (zamanlanmış) trend keşfi kullanıcı talebiyle DEVRE
# DIŞI bırakıldı — içerik bundan sonra manuel hazırlanıyor. Aşağıdaki `schedule`
# bloğu kapalıdır; yeniden açmak için yorumu kaldırmanız yeterli. Ajan yalnızca
# `workflow_dispatch` ile elle tetiklenebilir.
on:
  # schedule:
  #   # Her Pazartesi 06:00 UTC
  #   - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      draft_count:
        description: 'Üretilecek taslak sayısı (1-10)'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  taslak-uret:
    name: Trend keşfi + taslak üretimi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Git kullanıcısını yapılandır
        run: |
          git config user.name "Satıcı Kutusu Bot"
          git config user.email "bot@saticikutusu.com"

      - name: Taslak üret (Claude API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRAFT_COUNT: ${{ github.event.inputs.draft_count || '2' }}
        run: npm run agent:drafts

      - name: Yeni taslakları belirle ve commit et
        id: commit_drafts
        run: |
          git add drafts/
          NEW=$(git diff --staged --name-only -- 'drafts/*.md' | grep -v 'README.md' || true)
          if [ -z "$NEW" ]; then
            echo "Yeni taslak yok — commit atlandı."
            echo "has_drafts=false" >> "$GITHUB_OUTPUT"
          else
            echo "Yeni taslaklar:"
            echo "$NEW"
            git commit -m "chore(agent): yeni trend taslakları [skip vercel]"
            git push origin main
            echo "has_drafts=true" >> "$GITHUB_OUTPUT"
            # Boşlukla ayrılmış liste (notify-telegram.ts'e argüman olarak geçirilir)
            FILES=$(echo "$NEW" | tr '\n' ' ' | sed 's/ $//')
            echo "draft_files=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram bildirimi gönder
        if: steps.commit_drafts.outputs.has_drafts == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx scripts/notify-telegram.ts ${{ steps.commit_drafts.outputs.draft_files }}
