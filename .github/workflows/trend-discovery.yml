name: Trend Keşif Ajanı (Faz 2)

# Zamanlanmış + elle tetiklenebilir. Otomatik YAYIN YAPMAZ: yalnızca taslak
# üretip drafts/'a commit eder ve Telegram bildirimi gönderir.
# Onay: Telegram mesajındaki ✅ Yayınla butonuna basılınca Vercel webhook devralır.
on:
  schedule:
    # Her Pazartesi 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      draft_count:
        description: 'Üretilecek taslak sayısı (1-10)'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  taslak-uret:
    name: Trend keşfi + taslak üretimi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Git kullanıcısını yapılandır
        run: |
          git config user.name "Satıcı Kutusu Bot"
          git config user.email "bot@saticikutusu.com"

      - name: Taslak üret (Claude API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRAFT_COUNT: ${{ github.event.inputs.draft_count || '2' }}
        run: npm run agent:drafts

      - name: Yeni taslakları belirle ve commit et
        id: commit_drafts
        run: |
          git add drafts/
          NEW=$(git diff --staged --name-only -- 'drafts/*.md' | grep -v 'README.md' || true)
          if [ -z "$NEW" ]; then
            echo "Yeni taslak yok — commit atlandı."
          else
            echo "Yeni taslaklar:"
            echo "$NEW"
            git commit -m "chore(agent): yeni trend taslakları [skip vercel]"
            git push origin main
          fi

      - name: Telegram bildirimi gönder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Onay bekleyen tüm taslakları bildir (yeni + önceki birikmiş).
          DRAFTS=$(ls drafts/*.md 2>/dev/null | grep -v 'README.md' | tr '\n' ' ' || true)
          if [ -n "$DRAFTS" ]; then
            npx tsx scripts/notify-telegram.ts $DRAFTS
          else
            echo "[telegram] Bekleyen taslak yok."
          fi
