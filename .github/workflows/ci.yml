name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  quality-gate:
    name: Kalite Kapısı (build + lint + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Lint (astro check + eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build
